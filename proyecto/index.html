<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Menú de Animales</title>

<style>

/* Estilos básicos para el menú */
nav ul{
list-style:none;
padding:0;
margin:0;
background-color:#2c3e50;
display:flex;
}

/* columnas del menú */
nav > ul > li{
position:relative;
flex:1;
text-align:center;
}

/* enlaces */
nav a{
display:block;
padding:15px;
color:white;
text-decoration:none;
font-family:Arial, sans-serif;
font-weight:bold;
}

/* efecto hover */
nav li:hover{
background-color:#34495e;
}

/* submenú oculto */
.dropdown{
display:none;
position:absolute;
background-color:#ecf0f1;
width:100%;
box-shadow:0px 8px 16px rgba(0,0,0,0.2);
z-index:1;
}

/* enlaces del submenú */
.dropdown li a{
color:#333;
font-weight:normal;
border-bottom:1px solid #ddd;
}

/* hover del submenú */
.dropdown li a:hover{
background-color:#bdc3c7;
}

/* mostrar submenú */
nav > ul > li:hover .dropdown{
display:block;
}

</style>
</head>
